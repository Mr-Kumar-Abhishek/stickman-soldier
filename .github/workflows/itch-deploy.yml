name: Deploy to itch.io

on:
  push:
    branches:
      - master
  workflow_dispatch: # Allows manual deployment from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Game Archive
        run: |
          # Create a clean directory with only the necessary game files
          mkdir build
          cp index.html build/
          cp style.css build/
          cp script.js build/

      - name: Deploy to itch.io via Butler Action
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          # Note: This action uses BUTLER_CREDENTIALS instead of BUTLER_API_KEY
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: html5
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          ITCH_USER: ${{ secrets.ITCH_USER }}
          PACKAGE: build
          VERSION: ${{ github.run_number }}
