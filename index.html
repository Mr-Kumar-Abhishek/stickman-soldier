<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickman Soldier</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <div id="background"></div>
        <div id="ui">
            <div id="score">SCORE: 0</div>
            <div id="lives">LIVES: 3</div>
        </div>
        <div id="world">
            <!-- Game entities will be injected here -->
        </div>
        <div id="game-over" class="hidden">
            <h1>GAME OVER</h1>
            <p>Press R to Restart</p>
        </div>
        <div id="start-screen">
            <h1>STICKMAN SOLDIER</h1>
            <div class="instructions">
                <h3>CONTROLS</h3>
                <ul>
                    <li><strong>W A S D</strong> or <strong>Arrows</strong>: Move & Aim</li>
                    <li><strong>K</strong> or <strong>X</strong>: Jump</li>
                    <li><strong>J</strong> or <strong>Z</strong>: Shoot</li>
                </ul>
                <p class="blink">Press ENTER to Start</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
